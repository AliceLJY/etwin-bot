name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Unit tests
        run: bun test
        env:
          HOME: ${{ runner.temp }}/home
          ETWIN_DATA_DIR: ${{ runner.temp }}/data
          ETWIN_FILE_DIR: ${{ runner.temp }}/files
      - name: Bundle entry point
        run: bun build ./bot.js --target=bun --outdir "${RUNNER_TEMP}/etwin-build"
